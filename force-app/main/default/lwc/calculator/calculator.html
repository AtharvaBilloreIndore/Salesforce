<template>
    <lightning-card title="Calculator" icon-name="custom:custom14">
        <div class="slds-var-p-around_small">
            <lightning-input label="Number1" name='number1' onchange={changeHandlerNumber}
                placeholder="Enter Numer 1"></lightning-input>
            <lightning-input label="Number2" name='number2' onchange={changeHandlerNumber}
                placeholder="Enter number 2"></lightning-input>
        </div>
        <div class="slds-var-p-around_small">
            <lightning-button label="Add" variant="brand" class="slds-var-p-around_small"
                onclick={addHandler}></lightning-button>
            <lightning-button label="Subtract" variant="brand" class="slds-var-p-around_small"
                onclick={subHandler}></lightning-button>
            <lightning-button label="Multiplication" variant="brand" class="slds-var-p-around_small"
                onclick={mulHandler}></lightning-button>
            <lightning-button label="Division" variant="brand" class="slds-var-p-around_small"
                onclick={divHandler}></lightning-button>
        </div>
        <div class="slds-var-p-around_small">
            <p>
                Output : {result}
            </p>
        </div>
    </lightning-card>
</template>
